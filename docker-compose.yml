services:
  airflow-postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  dw-postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: velib
      POSTGRES_PASSWORD: velib
      POSTGRES_DB: velib_dw
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U velib -d velib_dw"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - dw_postgres_data:/var/lib/postgresql/data

  airflow-init:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    image: mlops-bikeshare-airflow:2.10.3-local
    depends_on:
      - airflow-postgres
      - redis
      - dw-postgres
    environment: &airflow-env
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CELERY__WORKER_PREFETCH_MULTIPLIER: "1"
      AIRFLOW__CELERY__TASK_ACKS_LATE: "true"
      # Airflow 2.10.3 still emits this deprecation warning internally even when the new key is used.
      PYTHONWARNINGS: "ignore::FutureWarning:airflow.configuration"
      GBFS_BASE_URL: "https://velib-metropole-opendata.smovengo.cloud/opendata/Velib_Metropole/gbfs.json"
      GBFS_CITY: "paris"
      DW_CONN_ID: "velib_dw"
      AIRFLOW_TIER1_QUEUE: "tier1"
      AIRFLOW_TIER2_QUEUE: "tier2"
      DBT_PROJECT_DIR: "dbt/bikeshare_dbt"
      DBT_PROFILES_DIR: "dbt"
      DBT_HOST: "dw-postgres"
      DBT_PORT: "5432"
      DBT_USER: "velib"
      DBT_PASSWORD: "velib"
      DBT_DATABASE: "velib_dw"
      DBT_SCHEMA: "analytics"
      DBT_THREADS: "1"
      DBT_AIRFLOW_POOL: "dbt_quality_pool"
      DBT_HOTPATH_POOL: "dbt_hotpath_pool"
      DBT_FEATURE_POOL: "dbt_feature_pool"
      DBT_QUALITY_POOL: "dbt_quality_pool"
      SERVING_PREDICTION_POOL: "serving_prediction_pool"
      SERVING_OBSERVABILITY_POOL: "serving_observability_pool"
      DBT_FEATURE_BUILD_SELECTOR: "hf_feature_build_models"
      DBT_FEATURE_BUILD_TEST_SELECTOR: "hf_smoke_tests"
      DBT_FEATURE_BUILD_SKIP_TESTS: "false"
      DBT_QUALITY_TEST_SELECTOR: "quality_gate_tests"
      DBT_SOURCE_FRESHNESS_SELECT: "source:raw_staging.stg_station_status source:raw_staging.stg_station_information source:raw_staging.stg_weather_current source:raw_staging.stg_weather_hourly source:raw_staging.stg_holidays"
      DBT_WEATHER_CURRENT_WARN_MINUTES: "30"
      DBT_WEATHER_CURRENT_ERROR_MINUTES: "120"
      DBT_WEATHER_HOURLY_WARN_MINUTES: "30"
      DBT_WEATHER_HOURLY_ERROR_MINUTES: "120"
      DBT_WEATHER_MIN_FORECAST_COVERAGE_MINUTES: "30"
      DBT_CAPACITY_MISMATCH_WARN_RATE: "0.005"
      DBT_CAPACITY_MISMATCH_ERROR_RATE: "0.02"
      DBT_DUPLICATE_WARN_RATE: "0.001"
      DBT_DUPLICATE_ERROR_RATE: "0.01"
      DBT_QUALITY_LOOKBACK_HOURS: "2"
      DBT_STATION_INFORMATION_QUALITY_LOOKBACK_DAYS: "2"
      AWS_REGION: ${AWS_REGION}
      AWS_DEFAULT_REGION: eu-west-3
      AWS_SDK_LOAD_CONFIG: "1"
      CITY: ${CITY}
      BUCKET: ${BUCKET}
      PSI_MAX_FEATURE_AGE_MINUTES: "45"
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY}
    volumes: &airflow-volumes
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/logs:/opt/airflow/logs
      - ./src:/opt/airflow/src
      - ./dbt:/opt/airflow/dbt
      - ./pipelines:/opt/airflow/pipelines
      - ./model_dir:/opt/airflow/model_dir
    command: >
      bash -c "airflow db migrate &&
      (airflow users create --username admin --password admin --firstname admin --lastname user --role Admin --email admin@example.com || true) &&
      (airflow pools set dbt_hotpath_pool 1 'Tier-1 dbt hotpath' || true) &&
      (airflow pools set dbt_feature_pool 1 'Tier-1 dbt feature build' || true) &&
      (airflow pools set dbt_quality_pool 1 'Tier-2 dbt quality and refresh' || true) &&
      (airflow pools set serving_prediction_pool 2 'Tier-1 serving prediction runtime' || true) &&
      (airflow pools set serving_observability_pool 1 'Tier-2 serving observability' || true)"

  airflow-webserver:
    image: mlops-bikeshare-airflow:2.10.3-local
    depends_on:
      - airflow-init
      - redis
    environment: *airflow-env
    volumes: *airflow-volumes
    ports:
      - "8080:8080"
    command: webserver

  airflow-scheduler:
    image: mlops-bikeshare-airflow:2.10.3-local
    depends_on:
      - airflow-init
      - redis
    environment: *airflow-env
    volumes: *airflow-volumes
    command: scheduler

  airflow-worker-tier1:
    image: mlops-bikeshare-airflow:2.10.3-local
    depends_on:
      - airflow-init
      - redis
    environment: *airflow-env
    volumes: *airflow-volumes
    command: >
      bash -c "exec airflow celery worker
      --queues tier1
      --concurrency 2
      --celery-hostname worker-tier1@%h"

  airflow-worker-tier2:
    image: mlops-bikeshare-airflow:2.10.3-local
    depends_on:
      - airflow-init
      - redis
    environment: *airflow-env
    volumes: *airflow-volumes
    command: >
      bash -c "exec airflow celery worker
      --queues tier2,default
      --concurrency 1
      --celery-hostname worker-tier2@%h"
  
  mlflow-postgres:
    image: postgres:15
    container_name: mlflow-postgres
    environment:
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow
      POSTGRES_DB: mlflow
    ports:
      - "15433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow -d mlflow"]
      interval: 10s
      timeout: 5s
      retries: 10  
    volumes:
      - mlflow_postgres_data:/var/lib/postgresql/data
  
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.22.1
    depends_on:
      mlflow-postgres:
        condition: service_healthy
    ports:
      - "5000:5000"
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql://mlflow:mlflow@mlflow-postgres:5432/mlflow
      MLFLOW_DEFAULT_ARTIFACT_ROOT: /mlartifacts
    volumes:
      - ./mlartifacts:/mlartifacts
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://mlflow:mlflow@mlflow-postgres:5432/mlflow
      --default-artifact-root /mlartifacts
    

  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.app
    ports:
      - "8501:8080"
    depends_on:
      dw-postgres:
        condition: service_healthy
    environment:
      # Override Postgres connection to Docker-internal network.
      # The same .streamlit/secrets.toml (pg_host=localhost, pg_port=15432) works
      # locally; on EC2 these env vars take precedence automatically.
      STREAMLIT_PG_HOST: "dw-postgres"
      STREAMLIT_PG_PORT: "5432"
      AWS_REGION: ${AWS_REGION:-eu-west-3}
      AWS_DEFAULT_REGION: eu-west-3
      AWS_SDK_LOAD_CONFIG: "1"
      CITY: ${CITY:-paris}
      BUCKET: ${BUCKET}
    volumes:
      - ./.streamlit:/app/.streamlit:ro
    restart: unless-stopped

volumes:
  airflow_postgres_data:
  dw_postgres_data:
  mlflow_postgres_data:
