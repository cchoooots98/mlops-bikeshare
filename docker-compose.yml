services:
  airflow-postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data

  dw-postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: velib
      POSTGRES_PASSWORD: velib
      POSTGRES_DB: velib_dw
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U velib -d velib_dw"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - dw_postgres_data:/var/lib/postgresql/data

  airflow-init:
    image: apache/airflow:2.10.3
    depends_on:
      - airflow-postgres
      - dw-postgres
    environment: &airflow-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      _PIP_ADDITIONAL_REQUIREMENTS: "pandas==2.1.4 psycopg2-binary==2.9.10 requests==2.32.3"
      GBFS_BASE_URL: "https://velib-metropole-opendata.smovengo.cloud/opendata/Velib_Metropole/gbfs.json"
      GBFS_CITY: "paris"
      DW_CONN_ID: "velib_dw"
    volumes: &airflow-volumes
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/logs:/opt/airflow/logs
      - ./src:/opt/airflow/src
    command: >
      bash -c "airflow db migrate && airflow users create --username admin --password admin --firstname admin --lastname user --role Admin --email admin@example.com || true"

  airflow-webserver:
    image: apache/airflow:2.10.3
    depends_on:
      - airflow-init
    environment: *airflow-env
    volumes: *airflow-volumes
    ports:
      - "8080:8080"
    command: webserver

  airflow-scheduler:
    image: apache/airflow:2.10.3
    depends_on:
      - airflow-init
    environment: *airflow-env
    volumes: *airflow-volumes
    command: scheduler

volumes:
  airflow_postgres_data:
  dw_postgres_data:
