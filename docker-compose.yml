services:
  airflow-postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data

  dw-postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: velib
      POSTGRES_PASSWORD: velib
      POSTGRES_DB: velib_dw
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U velib -d velib_dw"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - dw_postgres_data:/var/lib/postgresql/data

  airflow-init:
    image: apache/airflow:2.10.3
    depends_on:
      - airflow-postgres
      - dw-postgres
    environment: &airflow-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      _PIP_ADDITIONAL_REQUIREMENTS: "pandas==2.1.4 psycopg2-binary==2.9.10 requests==2.32.3 dbt-postgres==1.8.2"
      GBFS_BASE_URL: "https://velib-metropole-opendata.smovengo.cloud/opendata/Velib_Metropole/gbfs.json"
      GBFS_CITY: "paris"
      DW_CONN_ID: "velib_dw"
      DBT_PROJECT_DIR: "dbt/bikeshare_dbt"
      DBT_PROFILES_DIR: "dbt"
      DBT_HOST: "dw-postgres"
      DBT_PORT: "5432"
      DBT_USER: "velib"
      DBT_PASSWORD: "velib"
      DBT_DATABASE: "velib_dw"
      DBT_SCHEMA: "analytics"
      DBT_THREADS: "1"
      DBT_AIRFLOW_POOL: "dbt_warehouse_serial"
      DBT_FEATURE_BUILD_SELECTOR: "hf_feature_build_models"
      DBT_FEATURE_BUILD_TEST_SELECTOR: "hf_smoke_tests"
      DBT_FEATURE_BUILD_SKIP_TESTS: "false"
      DBT_QUALITY_MODEL_SELECTOR: "quality_models"
      DBT_QUALITY_TEST_SELECTOR: "quality_gate_tests"
      DBT_SOURCE_FRESHNESS_SELECT: "source:raw_staging.stg_station_status source:raw_staging.stg_station_information source:raw_staging.stg_weather_current source:raw_staging.stg_weather_hourly source:raw_staging.stg_holidays"
      DBT_WEATHER_CURRENT_WARN_MINUTES: "30"
      DBT_WEATHER_CURRENT_ERROR_MINUTES: "120"
      DBT_WEATHER_HOURLY_WARN_MINUTES: "30"
      DBT_WEATHER_HOURLY_ERROR_MINUTES: "120"
      DBT_WEATHER_MIN_FORECAST_COVERAGE_MINUTES: "30"
      DBT_CAPACITY_MISMATCH_WARN_RATE: "0.005"
      DBT_CAPACITY_MISMATCH_ERROR_RATE: "0.02"
      DBT_DUPLICATE_WARN_RATE: "0.001"
      DBT_DUPLICATE_ERROR_RATE: "0.01"
      DBT_QUALITY_LOOKBACK_HOURS: "2"
      DBT_STATION_INFORMATION_QUALITY_LOOKBACK_DAYS: "2"
      AWS_DEFAULT_REGION: eu-west-3
      AWS_PROFILE: Shirley-fr
      AWS_SDK_LOAD_CONFIG: "1"
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY}
    volumes: &airflow-volumes
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/logs:/opt/airflow/logs
      - ./src:/opt/airflow/src
      - ./dbt:/opt/airflow/dbt
      - ./pipelines:/opt/airflow/pipelines
      - ${USERPROFILE}/.aws/config:/home/airflow/.aws/config:ro
      - ${USERPROFILE}/.aws/credentials:/home/airflow/.aws/credentials:ro
      - ${USERPROFILE}/.aws/sso/cache:/home/airflow/.aws/sso/cache
    command: >
      bash -c "airflow db migrate && (airflow users create --username admin --password admin --firstname admin --lastname user --role Admin --email admin@example.com || true) && (airflow pools set dbt_warehouse_serial 1 'Serialize dbt warehouse mutations' || true)"

  airflow-webserver:
    image: apache/airflow:2.10.3
    depends_on:
      - airflow-init
    environment: *airflow-env
    volumes: *airflow-volumes
    ports:
      - "8080:8080"
    command: webserver

  airflow-scheduler:
    image: apache/airflow:2.10.3
    depends_on:
      - airflow-init
    environment: *airflow-env
    volumes: *airflow-volumes
    command: scheduler

volumes:
  airflow_postgres_data:
  dw_postgres_data:
