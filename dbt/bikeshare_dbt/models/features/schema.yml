version: 2

models:
  - name: feat_station_snapshot_5min
    config:
      contract:
        enforced: true
      tags: ["contract_critical", "feature_store", "incremental"]
      meta:
        sla: daily_contract
        tier: critical
    tests:
      - columns_match_contract:
          arguments:
            required_columns:
              - temperature_c
              - humidity_pct
              - wind_speed_ms
              - precipitation_mm
              - weather_code
              - hourly_temperature_c
              - hourly_humidity_pct
              - hourly_wind_speed_ms
              - hourly_precipitation_mm
              - hourly_precipitation_probability_pct
              - hourly_weather_code
            forbidden_columns:
              - weather_main
              - hourly_weather_main
              - weather_description
              - hourly_forecast_at
              - source
              - snapshot_bucket_at_utc
              - temp_c
              - precip_mm
              - wind_kph
              - rhum_pct
              - pres_hpa
              - wind_dir_deg
              - wind_gust_kph
              - snow_mm
    columns:
      - name: city
        data_type: text
        tests:
          - not_null
      - name: dt
        data_type: text
        tests:
          - not_null
      - name: station_id
        data_type: text
        tests:
          - not_null
      - name: capacity
        data_type: integer
        tests:
          - not_null
          - non_negative
      - name: lat
        data_type: double precision
        tests:
          - not_null
          - value_between:
              arguments:
                min_value: -90
                max_value: 90
      - name: lon
        data_type: double precision
        tests:
          - not_null
          - value_between:
              arguments:
                min_value: -180
                max_value: 180
      - name: bikes
        data_type: integer
        tests:
          - not_null
          - non_negative
      - name: docks
        data_type: integer
        tests:
          - not_null
          - non_negative
      - name: minutes_since_prev_snapshot
        data_type: double precision
        tests:
          - not_null
          - non_negative
      - name: util_bikes
        data_type: double precision
        tests:
          - not_null
          - value_between:
              arguments:
                min_value: 0
                max_value: 1
      - name: util_docks
        data_type: double precision
        tests:
          - not_null
          - value_between:
              arguments:
                min_value: 0
                max_value: 1
      - name: delta_bikes_5m
        data_type: double precision
      - name: delta_docks_5m
        data_type: double precision
      - name: roll15_net_bikes
        data_type: double precision
      - name: roll30_net_bikes
        data_type: double precision
      - name: roll60_net_bikes
        data_type: double precision
      - name: roll15_bikes_mean
        data_type: double precision
      - name: roll30_bikes_mean
        data_type: double precision
      - name: roll60_bikes_mean
        data_type: double precision
      - name: nbr_bikes_weighted
        data_type: double precision
        tests:
          - non_negative
      - name: nbr_docks_weighted
        data_type: double precision
        tests:
          - non_negative
      - name: has_neighbors_within_radius
        data_type: integer
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [0, 1]
      - name: neighbor_count_within_radius
        data_type: integer
        tests:
          - not_null
          - non_negative
      - name: hour
        data_type: integer
      - name: dow
        data_type: integer
      - name: is_weekend
        data_type: integer
      - name: is_holiday
        data_type: integer
      - name: temperature_c
        data_type: double precision
      - name: humidity_pct
        data_type: double precision
        tests:
          - value_between_or_null:
              arguments:
                min_value: 0
                max_value: 100
      - name: wind_speed_ms
        data_type: double precision
        tests:
          - non_negative
      - name: precipitation_mm
        data_type: double precision
        tests:
          - non_negative
      - name: weather_code
        data_type: integer
      - name: hourly_temperature_c
        data_type: double precision
      - name: hourly_humidity_pct
        data_type: double precision
        tests:
          - value_between_or_null:
              arguments:
                min_value: 0
                max_value: 100
      - name: hourly_wind_speed_ms
        data_type: double precision
        tests:
          - non_negative
      - name: hourly_precipitation_mm
        data_type: double precision
        tests:
          - non_negative
      - name: hourly_precipitation_probability_pct
        data_type: double precision
        tests:
          - value_between_or_null:
              arguments:
                min_value: 0
                max_value: 100
      - name: hourly_weather_code
        data_type: integer
      - name: target_bikes_t30
        data_type: integer
        tests:
          - non_negative
      - name: target_docks_t30
        data_type: integer
        tests:
          - non_negative
      - name: y_stockout_bikes_30
        data_type: integer
        tests:
          - accepted_values:
              arguments:
                values: [0, 1]
      - name: y_stockout_docks_30
        data_type: integer
        tests:
          - accepted_values:
              arguments:
                values: [0, 1]

