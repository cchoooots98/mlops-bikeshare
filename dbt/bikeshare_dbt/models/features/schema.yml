version: 2

models:
  - name: feat_station_snapshot_5min
    columns:
      - name: city
        tests:
          - not_null
      - name: dt
        tests:
          - not_null
      - name: station_id
        tests:
          - not_null
      - name: capacity
        tests:
          - not_null
          - non_negative
      - name: lat
        tests:
          - not_null
          - value_between:
              arguments:
                min_value: -90
                max_value: 90
      - name: lon
        tests:
          - not_null
          - value_between:
              arguments:
                min_value: -180
                max_value: 180
      - name: bikes
        tests:
          - not_null
          - non_negative
      - name: docks
        tests:
          - not_null
          - non_negative
      - name: minutes_since_prev_snapshot
        tests:
          - not_null
          - non_negative
      - name: util_bikes
        tests:
          - not_null
          - value_between:
              arguments:
                min_value: 0
                max_value: 1
      - name: util_docks
        tests:
          - not_null
          - value_between:
              arguments:
                min_value: 0
                max_value: 1
      - name: has_neighbors_within_radius
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [0, 1]
      - name: neighbor_count_within_radius
        tests:
          - not_null
          - non_negative
