version: 2

models:
  - name: int_station_neighbors
    config:
      contract:
        enforced: true
      tags: ["contract_critical"]
      meta:
        sla: daily_contract
        tier: shared
    columns:
      - name: city
        data_type: text
        tests:
          - not_null
      - name: station_key
        data_type: text
        tests:
          - not_null
      - name: station_id
        data_type: text
        tests:
          - not_null
      - name: neighbor_station_key
        data_type: text
        tests:
          - not_null
      - name: neighbor_station_id
        data_type: text
        tests:
          - not_null
      - name: distance_km
        data_type: double precision
        tests:
          - not_null
          - non_negative
      - name: neighbor_count_within_radius
        data_type: integer
        tests:
          - not_null
          - non_negative
      - name: neighbor_rank
        data_type: integer
        tests:
          - not_null
      - name: neighbor_weight
        data_type: double precision
        tests:
          - not_null

  - name: int_station_status_enriched
    config:
      contract:
        enforced: true
      tags: ["contract_critical"]
      meta:
        sla: daily_contract
        tier: shared
    columns:
      - name: fact_station_status_key
        data_type: text
        tests:
          - not_null
          - unique
      - name: city
        data_type: text
        tests:
          - not_null
      - name: station_id
        data_type: text
        tests:
          - not_null
      - name: station_key
        data_type: text
        tests:
          - not_null
      - name: station_version_key
        data_type: text
        tests:
          - not_null
      - name: snapshot_bucket_at_utc
        data_type: timestamp with time zone
        tests:
          - not_null
      - name: snapshot_bucket_at_paris
        data_type: timestamp without time zone
      - name: date_id
        data_type: integer
        tests:
          - not_null
      - name: time_id
        data_type: integer
        tests:
          - not_null
      - name: last_reported_at_utc
        data_type: timestamp with time zone
      - name: last_reported_at_paris
        data_type: timestamp without time zone
      - name: num_bikes_available
        data_type: integer
        tests:
          - not_null
          - non_negative
      - name: num_docks_available
        data_type: integer
        tests:
          - not_null
          - non_negative
      - name: is_renting
        data_type: smallint
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [0, 1]
      - name: is_returning
        data_type: smallint
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [0, 1]
      - name: capacity
        data_type: integer
        tests:
          - not_null
          - non_negative
      - name: latitude
        data_type: double precision
        tests:
          - not_null
          - value_between:
              arguments:
                min_value: -90
                max_value: 90
      - name: longitude
        data_type: double precision
        tests:
          - not_null
          - value_between:
              arguments:
                min_value: -180
                max_value: 180
      - name: date
        data_type: date
      - name: day_of_week
        data_type: integer
      - name: is_weekend
        data_type: boolean
      - name: is_holiday
        data_type: boolean
      - name: hour
        data_type: integer
      - name: minute
        data_type: integer
      - name: minute_of_day
        data_type: integer
      - name: weather_key
        data_type: text
      - name: weather_observed_at_utc
        data_type: timestamp with time zone
        tests:
          - column_pair_not_greater_than:
              arguments:
                other_column: snapshot_bucket_at_utc
      - name: temperature_c
        data_type: double precision
      - name: humidity_pct
        data_type: double precision
      - name: wind_speed_ms
        data_type: double precision
      - name: precipitation_mm
        data_type: double precision
      - name: weather_code
        data_type: integer
      - name: hourly_forecast_at
        data_type: timestamp with time zone
      - name: hourly_temperature_c
        data_type: double precision
      - name: hourly_humidity_pct
        data_type: double precision
      - name: hourly_wind_speed_ms
        data_type: double precision
      - name: hourly_precipitation_mm
        data_type: double precision
      - name: hourly_precipitation_probability_pct
        data_type: double precision
      - name: hourly_weather_code
        data_type: integer
      - name: weather_asof_lag_minutes
        data_type: double precision
        tests:
          - value_between:
              arguments:
                min_value: 0
                max_value: "{{ var('station_status_weather_asof_tolerance_minutes', 15) | int }}"
      - name: has_weather_context
        data_type: smallint
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [0, 1]
      - name: prev_snapshot_bucket_at_utc
        data_type: timestamp with time zone
      - name: minutes_since_prev_snapshot
        data_type: double precision
      - name: prev_num_bikes_available
        data_type: integer
      - name: prev_num_docks_available
        data_type: integer
