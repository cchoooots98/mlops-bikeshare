version: 2

models:
  - name: dim_station
    columns:
      - name: station_version_key
        tests:
          - not_null
          - unique
      - name: station_key
        tests:
          - not_null
      - name: city
        tests:
          - not_null
      - name: station_id
        tests:
          - not_null
      - name: valid_from_utc
        tests:
          - not_null
      - name: is_current
        tests:
          - not_null
      - name: capacity
        tests:
          - non_negative

  - name: fct_station_status
    columns:
      - name: fact_station_status_key
        tests:
          - not_null
          - unique
      - name: city
        tests:
          - not_null
      - name: station_id
        tests:
          - not_null
      - name: station_key
        tests:
          - not_null
      - name: station_version_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_station')
                field: station_version_key
      - name: snapshot_bucket_at_utc
        tests:
          - not_null
      - name: date_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_id
      - name: time_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_time')
                field: time_id
