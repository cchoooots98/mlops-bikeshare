version: 2

models:
  - name: stg_station_information
    columns:
      - name: station_info_pk
        tests:
          - not_null
          - unique
      - name: city
        tests:
          - not_null
      - name: snapshot_bucket_at_utc
        tests:
          - not_null
      - name: station_id
        tests:
          - not_null
      - name: latitude
        tests:
          - not_null
          - value_between:
              arguments:
                min_value: -90
                max_value: 90
      - name: longitude
        tests:
          - not_null
          - value_between:
              arguments:
                min_value: -180
                max_value: 180
      - name: station_key
        tests:
          - not_null
      - name: capacity
        tests:
          - non_negative

  - name: stg_station_status
    columns:
      - name: station_status_pk
        tests:
          - not_null
          - unique
      - name: city
        tests:
          - not_null
      - name: snapshot_bucket_at_utc
        tests:
          - not_null
      - name: station_id
        tests:
          - not_null
      - name: station_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_station_information')
                field: station_key

  - name: stg_weather_current
    columns:
      - name: weather_current_pk
        tests:
          - not_null
          - unique
      - name: city
        tests:
          - not_null
      - name: snapshot_bucket_at_utc
        tests:
          - not_null
      - name: observed_at_utc
        tests:
          - not_null

  - name: stg_weather_hourly
    columns:
      - name: weather_hourly_pk
        tests:
          - not_null
          - unique
      - name: city
        tests:
          - not_null
      - name: snapshot_bucket_at_utc
        tests:
          - not_null
      - name: forecast_at_utc
        tests:
          - not_null

  - name: stg_holidays
    columns:
      - name: holiday_pk
        tests:
          - not_null
          - unique
      - name: holiday_date
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date
      - name: is_holiday
        tests:
          - not_null
