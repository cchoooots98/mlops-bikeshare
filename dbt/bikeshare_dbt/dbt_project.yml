name: bikeshare_dbt
version: 1.0.0
config-version: 2

profile: bikeshare_dbt

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  bikeshare_dbt:
    staging:
      +materialized: view
    marts:
      +materialized: table
    intermediate:
      +materialized: table
    # Feature models intentionally set materialization per model because
    # historical feature tables and latest-serving projections have different
    # operating patterns.
    features: {}
    debug:
      +enabled: false
