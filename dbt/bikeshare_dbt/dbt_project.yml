name: bikeshare_dbt
version: 1.0.0
config-version: 2

profile: bikeshare_dbt

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  bikeshare_dbt:
    +meta:
      owner: data_platform
      domain: bikeshare
    staging:
      +materialized: view
      +tags: ["source_quality"]
      +meta:
        sla: best_effort
        tier: supporting
    marts:
      +materialized: table
      +tags: ["contract_critical"]
      +meta:
        sla: daily_contract
        tier: shared
    intermediate:
      +materialized: table
      +tags: ["contract_critical"]
      +meta:
        sla: daily_contract
        tier: shared
    # Feature models intentionally set materialization per model because
    # historical feature tables and latest-serving projections have different
    # operating patterns.
    features:
      +tags: ["contract_critical", "feature_store"]
      +meta:
        sla: daily_contract
        tier: critical
    debug:
      +enabled: false
