      method: tag
      value: hf_hotpath_smoke

  - name: quality_gate_tests
    definition:
      method: tag
      value: quality_gate

  - name: hourly_quality_gate_tests
    definition:
      method: tag
      value: quality_gate

  - name: deep_quality_tests
