      union:
        - method: fqn
          value: feat_station_snapshot_5min
        - method: fqn
          value: feat_station_snapshot_latest

  - name: hf_station_status_hotpath_models
    definition:
      union:
        - method: fqn
          value: dim_date
        - method: fqn
          value: dim_time
        - method: fqn
          value: fct_station_status
        - method: fqn
          value: int_station_status_enriched

  - name: weather_refresh_models
    definition:
