bikeshare_dbt:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('DBT_HOST', 'localhost') }}"
      user: "{{ env_var('DBT_USER', 'velib') }}"
      password: "{{ env_var('DBT_PASSWORD', 'velib') }}"
      port: "{{ env_var('DBT_PORT', '15432') | int }}"
      dbname: "{{ env_var('DBT_DATABASE', 'velib_dw') }}"
      schema: "{{ env_var('DBT_SCHEMA', 'analytics') }}"
      threads: "{{ env_var('DBT_THREADS', '4') | int }}"
      connect_timeout: "{{ env_var('DBT_CONNECT_TIMEOUT', '10') | int }}"
      sslmode: prefer
